name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: nix-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Use rood-reverse cachix
        uses: cachix/cachix-action@v15
        with:
          name: rood-reverse
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Evaluate flake
        run: nix flake check --no-build

      - name: Build dev shell
        run: nix develop -c true

      - name: make format
        run: nix develop -c bash -lc 'make format && git diff --exit-code'

      - name: CI smoke build (fixture + golden hashes)
        run: nix develop -c bash -lc 'make ci-smoke'
