strings:
- This section explains the basic game controls.
- Controls change depending on the current mode.
- '|>6|'
- 'The following topics are covered:'
- '|>6|'
- ' 1. Normal Mode'
- ' 2. Battle Mode'
- ' 3. Menu Screen'
- ' 4. Shortcut Commands'
- '|>6|'
- '|f2|★|f0|Please refer to the software manual for'
- '  complete descriptions of these functions.'
- '|>6|'
- '|>6|'
- '|f1|1. Normal Mode Controls|f0|'
- '|>6|'
- '      -In Normal Mode, Ashley''s weapon and shield'
- '       are put away.'
- '      -Use this mode for regular movement.'
- '      -See the "Game Modes" section for details.'
- '|>6|'
- '   |f1|Directional buttons/left stick|f0|'
- '      -Move + grip (hanging)'
- '              climb (climbing)'
- '      -Change perspective in Free-look mode'
- '|>6|'
- ' |f2|★|f0|Press in the direction in which to climb,'
- '   and Ashley will grip and climb up.'
- '|>6|'
- '   |f1|Right stick|f0| -Free-look'
- '|>6|'
- '   |f1|SELECT button|f0|   |f1|START button|f0|'
- '      -Zoom in        -Free-look'
- '      -Zoom out       -Skip demo'
- '|>6|'
- ' |f2|★|f0|Press the SELECT button to change the screen'
- '   display size.'
- '|>6|'
- '      |f1|button|f0| -Execute command'
- '             -Draw weapon (enter Battle Mode)'
- '|>6|'
- ' |f2|★|f0|See the "Game Modes" section for a complete'
- '   description of Battle Mode.'
- '|>6|'
- '      |f1|button|f0| -Cancel'
- '             -Open doors and treasure chests'
- '             -Move cubes (push, carry, place)'
- '             -End Free-look mode'
- '|>6|'
- ' |f2|★|f0|See "Puzzle Cubes" below for a complete'
- '   description of cubes.'
- '|>6|'
- '      |f1|button|f0| -Jump'
- '      |f1|button|f0| -Display menu'
- '|>6|'
- '      |f1|button|f0| -Rotate map counterclockwise'
- '      |f1|button|f0| -Rotate map clockwise'
- '|>6|'
- '      |f1|button|f0| -Shortcut commands'
- '      |f1|button|f0| -Walk, with directional buttons'
- '              or left stick'
- '|>6|'
- ' |f2|★|f0|See "Shortcut Commands" below for'
- '   a complete description of shortcuts.'
- '|>6|'
- '|>6|'
- '|>6|'
- '|f1|2. Battle Mode Controls|f0|'
- '|>6|'
- '        -In Battle Mode, Ashley has his weapon'
- '         and shield drawn and ready.'
- '        -Use this mode for combat.'
- '        -See the "Game Modes" quick manual for'
- '         details.'
- '|>6|'
- '   |f1|Directional buttons/left stick|f0|'
- '      -Move'
- '      -Select target'
- '      -Change perspective in Free-look mode.'
- '|>6|'
- ' |f2|★|f0|You can only select a target when the'
- '   targeting sphere is open.'
- '|>6|'
- '   |f1|Right stick|f0| -Free-look'
- '|>6|'
- '   |f1|SELECT button|f0|   |f1|START button|f0|'
- '      -Zoom in        -Free-look'
- '      -Zoom out       -Skip demo'
- '|>6|'
- '      |f1|button|f0| -Execute command'
- '             -Open and close targeting sphere'
- '|>6|'
- '      |f1|button|f0| -Cancel'
- '             -Open doors and treasure chests'
- '             -Close targeting sphere'
- '             -Switch to Normal Mode'
- '             -End Free-look mode'
- '|>6|'
- ' |f2|★|f0|For a detailed description of Normal Mode,'
- '   see the "Game Modes" quick manual.'
- '|>6|'
- '      |f1|button|f0| -Jump'
- '      |f1|button|f0| -Display menu'
- '|>6|'
- '      |f1|button|f0| -Rotate map counterclockwise'
- '      |f1|button|f0| -Rotate map clockwise'
- '|>6|'
- '      |f1|button|f0| -Shortcut commands'
- '             -Switch targets'
- '      |f1|button|f0| -Walk, with directional buttons'
- '              or left stick.'
- '|>6|'
- ' |f2|★|f0|You can only switch targets when the'
- '   targeting sphere is activated.'
- '|>6|'
- ' |f2|★|f0|For a detailed explanation of Battle'
- '   Abilities, see the "Chain Abilities" and'
- '   "Defense Abilities" sections.'
- '|>6|'
- '|>6|'
- '|>6|'
- '|f1|3. Menu Screen Controls|f0|'
- '|>6|'
- ' -Controls differ slightly depending on which'
- '  menu you are using. This section explains '
- '  the basic controls.'
- '|>6|'
- '   |f1|Directional buttons/left stick|f0|'
- '      -Move cursor'
- '      -Switch categories in the Item menu.'
- '|>6|'
- '   |f1|Right stick|f0| -Not used'
- '|>6|'
- '   |f1|SELECT button|f0|   |f1|START button|f0|'
- '      -Not used       -Not used'
- '|>6|'
- '      |f1|button|f0| -Execute command'
- '      |f1|button|f0| -Cancel'
- '|>6|'
- '      |f1|button|f0| -Not used'
- '      |f1|button|f0| -Exit menu screen'
- '|>6|'
- '      |f1|button|f0| -Switch menus'
- '             -Switch characters'
- '      |f1|button|f0| -Switch menus'
- '             -Switch characters'
- '|>6|'
- ' |f2|★|f0|You can only switch characters in'
- '   the status menu.'
- '|>6|'
- '      |f1|button|f0| -Not used'
- '      |f1|button|f0| -Not used'
- '|>6|'
- '|>6|'
- '|>6|'
- '|f1|4. Shortcut Commands|f0|'
- '|>6|'
- ' -Pressing the L2 button while in Battle or'
- '  Normal mode opens the shortcut menu.'
- ' -Keeping the L2 button depressed, select'
- '  from an on-screen menu of shortcut commands.'
- ' -There are two kinds of shortcut commands:'
- '|>6|'
- '|>6|'
- ' |f1|Shortcuts to menu commands|f0|'
- ' (Using directional buttons/left stick)'
- '|>6|'
- '                      ITEMS'
- '|>6|'
- '            DEFENSE           CHAIN'
- '|>6|'
- '                    BREAK ARTS'
- '|>6|'
- '  ITEMS'
- '    Opens the MISC category of the Items menu.'
- '    The menu is set so that you can immediately'
- '    use items.'
- '|>6|'
- '  DEFENSE'
- '    Assign Defense Abilities from the Battle'
- '    Abilities menu.'
- '|>6|'
- '  CHAIN'
- '    Assign Chain Abilities from the Battle'
- '    Abilities menu.'
- '|>6|'
- '  BREAK ARTS'
- '    Open Break Arts menu.'
- '|>6|'
- ' |f1|Shortcuts to Magic|f0|'
- ' (Using △,○,×, and □ buttons)'
- '|>6|'
- '                     SHAMAN'
- '|>6|'
- '          SORCERER            WARLOCK'
- '|>6|'
- '                    ENCHANTER'
- '|>6|'
- '  Open menus for each class of magic.'
- '|>6|'
- ' |f1|Special Controls|f0|'
- '|>6|'
- ' -Press the START button when viewing a'
- '  Quick Manual page to return to the top'
- '  of the current section.'
- '|>6|'
- ' -Press the START button when viewing the'
- '  Map menu to return the map facing and angle'
- '  to its original orientation.'
- '|>6|'
- ' -Press the L1, L2, R1, R2, SELECT, and START'
- '  buttons simultaneously to perform a soft reset.'
- '|>6|'
- '|>6|'
- '|>6|'
- '|>6|'
- '|>6|'
- '|>6|'
- '|>6|'
- This ends the Basic Controls section.
