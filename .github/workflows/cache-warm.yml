name: cache-warm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock

jobs:
  cache-warm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
          - system: x86_64-darwin
            runner: macos-13
    name: cache-warm (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Build dev shell
        run: nix build --print-out-paths .#devShells.${{ matrix.system }}.default > "$RUNNER_TEMP/dev-shell-paths"

      - name: Push to rood-reverse cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          mapfile -t paths < "$RUNNER_TEMP/dev-shell-paths"
          nix shell nixpkgs#cachix -c cachix push rood-reverse "${paths[@]}"
