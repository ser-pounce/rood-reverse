strengthLevel: |-
  Strength level.
  Affects attack and defense power.
intelligenceLevel: |-
  Intelligence level.
  Affects magic attacks and defense.
agilityLevel: |-
  Agility level.
  Affects chance to hit and evade.
hp: |-
  Hit Points (life).
  The game ends when HP reach 0.
mp: |-
  Magic Points.
  Used for casting spells.
risk: |-
  RISK points. A high RISK means you will receive
  more damage and be less likely to score hits.
