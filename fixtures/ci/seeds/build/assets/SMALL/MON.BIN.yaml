string_table:
- |-
  Once the inhabitants of Leá Monde, zombies
  emerge from the Dark to attack the living.
- |-
  Ancient Kildean corpses infused with
  the power of the Dark.
- |-
  Ghouls lurk in the Catacombs, longing for human
  flesh. Attacking their heads proves effective.
- |-
  The living dead, given power by demons
  of the Underworld.
- |-
  Corpses of Leá Monde's soldiers, brought
  back to life through the Dark's taint.
- |-
  Zombies of the Knights of the Cross, still
  in possession of potent martial skills.
- |-
  Zombies of Leá Monde's mages, who employ
  powerful offensive magic.
- |-
  Skeletal remains of zombie corpses.
  They lurk in darkness to attack the living.
- |-
  Skeletons the Dark has bestowed with more
  power and better defense.
- |-
  The bleached skeletons of former Kingsguard
  knights. Still possess great skill with blades.
- |-
  Souls of the deceased that attack any living
  thing in sight.
- |-
  Ghosts of the Underworld capable of casting
  potent magic.
- |-
  Stocky demihumans that form bands to attack
  their prey.
- |-
  Goblins endowed with the ability to use magic.
  They make their abode in the Undercity.
- |-
  Porcine demihumans that are able to use magic
  spells and any weapon they can find.
- |-
  Commanders of the orcs. Like their goblin kin,
  they attack in packs with weapons and magic.
- |-
  A species of demihuman known for their
  agility and strength.
- |-
  A subspecies of lizardmen with superior
  protection against fire and heat.
- |-
  Evil mages who have gained powerful magic
  and eternal life through demonic pacts.
- |-
  Liches with even greater magical knowledge who
  are said to practice ancient Kildean sorcery.
- |-
  The reaper of the Underworld, tasked with
  claiming the souls of the possessed.
- |-
  Sculptures of mythical creatures that have
  come to life.
- |-
  Messengers of the Underworld that swoop
  down to attack with weapons and magic.
- |-
  Pernicious demons that use varied weaponry
  and cast magic.
- |-
  Large insects that mimic chests of treasure
  to lure unawary treasure hunters.
- Shadows bereft of bodies, commanded by the Dark.
- |-
  Wolves, twisted into ferocious man-hunters
  by the Dark's influence.
- |-
  These hounds once guarded the gates of
  the Underworld.
- |-
  Large, agile bats that swoop down to strike
  from the air.
- |-
  Giant vampire bats rumored to drain
  a victim's life in a single blow.
- |-
  These normally slothful and large amoeba-like
  creatures can leap to assault their prey.
- |-
  Slime with the ability to spew poisonous
  spores.
- |-
  Often called "the Devil's Eye," these
  monsters are well versed in magic.
- |-
  Powerful jaws give these small, agile
  reptiles a savage attack.
- |-
  Fish-like forest spirits with armored heads.
  Their magic gives them an extra edge in battle.
- |-
  Birds of the Underworld feared for their
  unmerciful spell of death.
- |-
  Dolls possessed by the souls of children who
  lost their lives to war or illness.
- |-
  Dolls possessed by evil spirits. Their
  shrieks kill all within earshot.
- |-
  Half-beast, half-human monster well known for
  its expert use of a viciously heavy mace.
- |-
  Minotaurs with tattoos of magic protection
  enscribed upon their bodies.
- |2-
   Minotaur zombies. They feel no pain,
   and they fight till their final death.
- |-
  Knightly armor possessed by the Dark and
  capable of magical and physical attacks.
- |-
  An armor relic of the holy wars. Its only
  weakness is the gap below its chest plate.
- |-
  Spirits of fallen soldiers, unaffected
  by chain abilities.
- |-
  Possessed crimson armor, once the special
  raiment of the Holy Knights.
- |-
  Creatures molded from granite, they deliver
  tremendous physical attacks.
- |-
  Golems crafted from iron. Their strong
  bodies are impervious to physical attacks.
- |-
  Golem made of the rare alloy Damascus. Highly
  resistant to both magical and physical attacks.
- |-
  Demons that fought humans in mythic times.
  Extremely agile and strong.
- |-
  Highly intelligent ogres with arcane spell
  knowledge.
- Dead ogres restored to life by necromancy.
- |-
  Giant crabs whose acidic breath can melt even
  the strongest armor.
- |-
  Crabs with shells of iron. Employ their
  massive weight as a lethal weapon.
- |-
  Crabs with shells as hard as Damascus. Weapons
  made from their shells are rare and valued.
- |-
  Lesser air spirits.
  Use earth affinity spells against them.
- |-
  Air daeva. This violent, angry spirit
  serves no mortal master.
- |-
  Lesser fire spirits. Vicious opponents
  with fiery magic at their disposal.
- |-
  Fire daeva. An arrogant spirit who enjoys
  burning humans with its spells.
- |-
  Low-level earth spirits. Originally benevolent
  spirits, magic has twisted them to evil.
- |-
  Earth daeva. An evil spirit who casts baneful
  spells to sate its yearning for human life.
- |-
  Lesser water spirits. Do not approach them
  without first preparing a suitable defense.
- |-
  Water daeva. Sunk Leá Monde into the waters 25
  years ago with the aid of Dao, the earth daeva.
- |-
  Lesser spirits of darkness. More powerful
  than other elemental spirits in Leá Monde.
- |-
  Dark daeva. It is filled with an
  insatiable craving to see the living suffer.
- Lesser wyrms with deadly breath attacks.
- |-
  A ferocious subspecies of dragon.
  They rarely appear above ground.
- |-
  Queen of dragons. Her rule is total and her
  spawn would readily give their lives for her.
- |-
  These legendary creatures possess a cruel
  and cunning intellect.
- |-
  Large dragons inhabiting clouds, they are
  also known as Thunder Dragons.
- ' Large dragons who draw energy from magma.'
- |-
  Also known as Land Dragons, their tough hides
  are nigh impossible to pierce.
- |-
  Because of their freezing breath attack, these
  dragons are often called the "Wyrms of Ice."
- |-
  The most intelligent of all dragons, but
  at the same time, one of the most evil.
- |-
  Dragons of the Underworld who feast on human
  flesh and souls.
- |-
  Powerful zombies who crave souls tainted
  by the Dark.
- |-
  Statue of the goddess of destruction that
  the Dark instilled with unholy life.
- |-
  A mechanical statue of a deity engineered
  in the era of Müllenkamp.
- |-
  A deity that lay imprisoned in the depths
  of Leá Monde for centuries.
