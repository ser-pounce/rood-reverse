simpleMap: SIMPLE MAP
simpleMapDesc: Select options for the simple map display.
timingDisplay: TIMING DISPLAY
timingDisplayDesc: |-
  Display signals to help with timing the use
  of Battle Abilities.
weaponStatus: WEAPON STATUS
weaponStatusDesc: |-
  Display any weapon status changes
  in the lower-left corner of the screen.
armorStatus: ARMOR STATUS
armorStatusDesc: |-
  Display any armor status changes
  in the lower-left corner of the screen.
cursorMemory: CURSOR MEMORY
cursorMemoryDesc: Store the cursor's last position in the menu.
information: INFORMATION
informationDesc: |-
  Change the settings for the information
  displayed at the bottom of the screen.
puzzleMode: PUZZLE MODE
puzzleModeDesc: |-
  Set the cube puzzle mode ON/OFF.
  This will only affect cleared levels.
sound: SOUND
soundDesc: Change sound output settings.
vibration: VIBRATION
vibrationDesc: Change vibration mode settings.
default: DEFAULT
defaultDesc: Restore default settings.
frame: FRAME
frameDesc: |-
  Displays the simple map in a frame.
  This is the default setting.
simple: SIMPLE
simpleDesc: Displays the simple map without a frame.
mapOff: 'OFF'
mapOffDesc: Turn simple map display OFF.
abilityTimingOn: 'ON'
abilityTimingOnDesc: |-
  Display the Battle Ability timing display.
  This is the default setting.
abilityTimingOff: 'OFF'
abilityTimingOffDesc: Turn the Battle Ability timing display OFF.
weaponStatusOn: 'ON'
weaponStatusOnDesc: Display weapon status changes.
weaponStatusOff: 'OFF'
weaponStatusOffDesc: |-
  Turn the weapon status display OFF.
  This is the default setting.
armorStatusOn: 'ON'
armorStatusOnDesc: Display armor status changes.
armorStatusOff: 'OFF'
armorStatusOffDesc: |-
  Turn the armor status display OFF.
  This is the default setting.
cursorMemoryOn: 'ON'
cursorMemoryOnDesc: |-
  The cursor will remain on the last selected
  item. This is the default setting.
cursorMemoryOff: 'OFF'
cursorMemoryOffDesc: |-
  The cursor will return to the top of the menu
  when a menu is closed.
infoOn: 'ON'
infoOnDesc: |-
  Display information at the bottom of the
  screen. This is the default setting.
infoOff: 'OFF'
infoOffDesc: Turn information display OFF.
puzzleModeOn: 'ON'
puzzleModeOnDesc: |-
  Enable the timed puzzle mode.
  This is the default setting.
puzzleModeOff: 'OFF'
puzzleModeOffDesc: |-
  Disable the timed puzzle mode and save solved
  puzzle routes.
stereo: STEREO
stereoDesc: |-
  If you have stereo speakers,
  select STEREO sound output (default).
mono: MONO
monoDesc: |-
  If you have monoaural speakers,
  select MONO sound output.
vibrationOn: 'ON'
vibrationOnDesc: |-
  Turn vibration mode ON.
  This is the default setting.
vibrationOff: 'OFF'
vibrationOffDesc: Turn vibration mode OFF.
defaultYes: 'YES'
defaultYesDesc: |-
  Restore all options to
  their default settings.
defaultNo: 'NO'
defaultNoDesc: Cancel restore default settings.
puzzleModeSettingDisabled: |-
  You cannot change the Puzzle Mode
  in the middle of a puzzle.
